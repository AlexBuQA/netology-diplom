# Репозиторный конфиг Atlantis. Кладётся в КОРЕНЬ репозитория netology-diplom.
# Указывает Atlantis, что Terraform-проект лежит в папке infrastructure
# и что план нужно строить автоматически при изменении *.tf файлов.
version: 3
projects:
  - name: infrastructure
    dir: infrastructure
    autoplan:
      when_modified:
        - "*.tf"
      enabled: true
